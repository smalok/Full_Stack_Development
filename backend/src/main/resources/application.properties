# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080

# ========================
# MySQL DATABASE
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/veltech_events?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root@2128
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT SECRET
# ========================
app.jwt.secret=VelTechCampusEventsSecretKey2026ForJWTTokenGenerationAndValidation
app.jwt.expiration=86400000

# ========================
# FILE UPLOAD (if needed)
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
